name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 3.1.0) — leave empty to use package.json version'
        required: false

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write Firebase config from secrets
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: node scripts/write-firebase-config.mjs

      - name: Build Vite app
        run: npm run build

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --publish never: we upload manually via softprops below
        run: npx electron-builder --win --publish never

      - name: List release output
        run: Get-ChildItem -Recurse release | Select-Object FullName, Length

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GMH Suite ${{ github.ref_name }}
          body: |
            ## GMH Suite ${{ github.ref_name }}

            ### Installation
            - **New install:** Download `GMH-Suite-Setup-*.exe` and run it
            - **Portable:** Download `GMH-Suite-*.exe` (no install needed)

            ### Auto-update
            Existing installs will be notified automatically on next launch.

            ### What's changed
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            release/*.exe
            release/*.yml
            release/*.yaml
            release/*.blockmap
